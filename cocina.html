<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cocina - Tukan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @media print {
            @page {
                size: 80mm auto;
                margin: 0 !important;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
                width: 80mm;
            }

            .no-print {
                display: none !important;
            }

            .ticket-impresion {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                padding: 5px 0px !important;
            }
        }
    </style>
</head>

<body class="w-full h-screen flex flex-col overflow-hidden font-sans relative" style="background-image: url('resources/tukan-fondo.png'); background-size: 300px; background-repeat: repeat;">
    <div class="absolute inset-0 bg-white/90 backdrop-blur-[2px] z-0 pointer-events-none"></div>
    <div class="relative z-10 w-full h-full flex flex-col p-4 md:p-6 overflow-y-auto no-scrollbar pb-32">
        <header class="no-print flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-slate-200/80 pb-4">
            <div>
                <h1 class="text-xl font-black uppercase tracking-wider text-emerald-900">🍳 PRODUCCIÓN: COCINA</h1>
                <p class="text-xs text-emerald-800/50 font-black uppercase tracking-widest">Control dinámico de comandas</p>
            </div>

            <button onclick="toggleHistorial()"
                class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-bold px-4 py-2 rounded-xl text-xs uppercase tracking-wider shadow-sm transition-all active:scale-95">📦
                Ver Recuperación</button>
        </header>

        <section id="panel-historial" class="no-print hidden bg-emerald-50/90 backdrop-blur-md border-2 border-emerald-100 p-4 rounded-3xl mb-6">
            <h3 class="text-xs font-black text-emerald-800 uppercase tracking-widest mb-3">Historial de Comandas Archivadas (Seguridad)</h3>
            <div id="lista-historial-recuperacion" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 text-xs"></div>
        </section>

        <main id="contenedor-comandas-visuales" class="no-print grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full h-fit"></main>

    </div>

    <div id="zona-invisible-impresion" class="hidden fixed inset-0 bg-white z-[100] text-black p-4"></div>

    <script src="config.js"></script>
    <script>
        const API = CONFIG.API_URL;
        let modoOperacion = localStorage.getItem('modo_cocina') || 'impresora';
        let idsComandasProcesadas = new Set();
        let checkboxesMarcadosCocina = new Set();

        function cambiarModoTrabajo(modo) {
            modoOperacion = modo;
            localStorage.setItem('modo_cocina', modo);

            const contVisual = document.getElementById('contenedor-comandas-visuales');
            if (!contVisual) return;

        }

        async function consultarComandas() {
            try {
                const resModo = await fetch(`${API}/api/sistema/modos_pantalla`);
                const modos = await resModo.json();
                modoOperacion = modos.cocina;

                const res = await fetch(`${API}/api/comandas/cocina`);
                const comandas = await res.json();

                if (modoOperacion === 'impresora' && comandas.length > 0) {
                    for (let c of comandas) {
                        if (!idsComandasProcesadas.has(c.id)) {
                            idsComandasProcesadas.add(c.id);
                            ejecutarImpresionTermica(c);
                        }
                    }
                }
                renderizarPantallaTablet(comandas);
            } catch (e) { console.error(e); }
        }

        function ejecutarImpresionTermica(c) {
            const zona = document.getElementById('zona-invisible-impresion');

            const itemsAgrupados = {};
            c.items.forEach(item => {
                const modsTexto = item.modificadores.map(m => m.nombre).sort().join(',');
                const llaveUnica = `${item.producto}|${modsTexto}|${item.nota || ''}`;

                if (itemsAgrupados[llaveUnica]) {
                    itemsAgrupados[llaveUnica].cantidad++;
                } else {
                    itemsAgrupados[llaveUnica] = {
                        producto: item.producto,
                        modificadores: item.modificadores,
                        nota: item.nota,
                        cantidad: 1
                    };
                }
            });

            const itemsHtml = Object.values(itemsAgrupados).map(i => {
                let subtext = i.modificadores.map(m => `  + ${m.nombre}`).join('<br>');
                if (i.nota) subtext += (subtext ? '<br>' : '') + `  * NOTA: ${i.nota}`;
                return `<div class="font-black text-sm uppercase">x${i.cantidad} ${i.producto}</div>
                ${subtext ? `<div class="text-xs font-mono text-slate-700 ml-4 mb-1">${subtext}</div>` : ''}`;
            }).join('<br>');

            zona.innerHTML = `
        <div class="ticket-impresion text-center font-mono">
            <p class="text-xs font-black border-b border-black pb-1 mb-2">*** COMANDA COCINA ***</p>
            ${c.mesa.startsWith('L-') ? '🥡 ' + c.mesa : c.mesa}
            <p class="text-[10px] text-slate-600 mb-4">${c.fecha}</p>
            <div class="text-left border-b border-black pb-2 mb-2">${itemsHtml}</div>
            <p class="text-[9px] text-slate-400">--- SISTEMA TUKAN POS ---</p>
        </div>
    `;

            document.body.classList.add('overflow-hidden');
            zona.classList.remove('hidden');

            setTimeout(() => {
                window.print();
                zona.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
                marcarCompletada(c.id);
            }, 300);
        }

        function renderizarPantallaTablet(comandas) {
            const contenedor = document.getElementById('contenedor-comandas-visuales');
            if (comandas.length === 0) {
                contenedor.innerHTML = '<div class="col-span-full text-center text-emerald-800/40 font-black uppercase tracking-widest py-20 text-sm">Esperando pedidos de cocina... 🍳</div>';
                return;
            }

            contenedor.innerHTML = comandas.map((c, idxComanda) => {
                const esLlevar = c.mesa.startsWith('L-');

                const itemsAgrupados = {};
                c.items.forEach(item => {
                    const modsTexto = item.modificadores.map(m => m.nombre).sort().join(',');
                    const llaveUnica = `${item.producto}|${modsTexto}|${item.nota || ''}`;

                    if (itemsAgrupados[llaveUnica]) {
                        itemsAgrupados[llaveUnica].cantidad++;
                    } else {
                        itemsAgrupados[llaveUnica] = {
                            producto: item.producto,
                            modificadores: item.modificadores,
                            nota: item.nota,
                            cantidad: 1
                        };
                    }
                });

                const listaItems = Object.values(itemsAgrupados).map(item => {
                    let detalle = item.modificadores.map(m => m.nombre).join(', ');
                    if (item.nota) detalle += (detalle ? ' | ' : '') + item.nota;

                    const idControlFila = `${c.id}-${item.producto}-${item.nota || 'sin-nota'}`;
                    const estaChecado = checkboxesMarcadosCocina.has(idControlFila) ? 'checked' : '';

                    return `
                <label class="flex items-start gap-2.5 p-2 bg-white/60 backdrop-blur-sm rounded-xl border border-slate-200/50 cursor-pointer hover:bg-white transition-all">
                    <input type="checkbox" 
                        onchange="guardarEstadoCheckCocina('${idControlFila}', this.checked)" 
                        ${estaChecado} 
                        class="w-4 h-4 text-orange-500 rounded bg-slate-50 border-slate-300 mt-0.5 focus:ring-0 focus:ring-offset-0">
                    <div class="text-xs">
                        <div class="font-black uppercase text-slate-800">
                            <span class="text-orange-500 font-mono mr-1">x${item.cantidad}</span> ${item.producto}
                        </div>
                        ${detalle ? `<div class="text-[10px] text-orange-600/80 font-black font-mono mt-0.5">↳ ${detalle}</div>` : ''}
                    </div>
                </label>
            `;
                }).join('');

                return `
            <div class="bg-white/70 backdrop-blur-md border-2 ${esLlevar ? 'border-orange-500/60 shadow-orange-500/5' : 'border-slate-200/60'} p-4 rounded-3xl shadow-xl flex flex-col justify-between h-fit gap-4 transition-all w-full">
                <div>
                    <div class="flex justify-between items-start border-b border-slate-200 pb-2 mb-3">
                        ${c.mesa.startsWith('L-') ? '🥡 ' + c.mesa : c.mesa}
                        <span class="text-[10px] font-mono text-slate-400 font-bold">${c.fecha}</span>
                    </div>
                    <div class="space-y-1.5">${listaItems}</div>
                </div>
                <button onclick="marcarCompletada('${c.id}')" class="w-full py-3 rounded-xl font-black text-xs uppercase shadow-md transition-all active:scale-95
                    ${esLlevar ? 'bg-orange-500 hover:bg-orange-600 text-white shadow-orange-500/10' : 'bg-emerald-800 hover:bg-emerald-900 text-white shadow-emerald-800/10'}">
                    ✓ Terminar Orden
                </button>
            </div>
        `;
            }).join('');
        }

        function guardarEstadoCheckCocina(idFila, isChecked) {
            if (isChecked) {
                checkboxesMarcadosCocina.add(idFila);
            } else {
                checkboxesMarcadosCocina.delete(idFila);
            }
        }

        async function marcarCompletada(id) {
            await fetch(`${API}/api/comandas/completar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            consultarComandas();
            if (!document.getElementById('panel-historial').classList.contains('hidden')) cargarHistorial();
        }

        function toggleHistorial() {
            const panel = document.getElementById('panel-historial');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) cargarHistorial();
        }

        async function cargarHistorial() {
            try {
                const res = await fetch(`${API}/api/comandas_sistema/historial`);
                const datos = await res.json();
                const deCocina = datos.filter(c => c.destinoCierre === 'cocina');

                const cont = document.getElementById('lista-historial-recuperacion');

                let htmlHistorial = `
            <div class="col-span-full mb-2 flex justify-end">
                <button onclick="purgarHistorialCompleto()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-600 hover:text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-wider transition-all shadow-sm active:scale-95">
                    Definir 🗑️ Limpiar Todo el Historial
                </button>
            </div>
        `;

                if (deCocina.length === 0) {
                    cont.innerHTML = htmlHistorial + '<p class="col-span-full text-emerald-800/40 font-black italic p-2">No hay comandas despachadas en esta sesión.</p>';
                    return;
                }

                htmlHistorial += deCocina.map(c => {
                    const resumenProductos = c.items.map(i => i.producto).join(', ');
                    const esLlevar = c.mesa.startsWith('L-');
                    return `
                <div class="bg-white/80 border border-slate-200 p-3 rounded-xl flex flex-col justify-between gap-2 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            ${c.mesa.startsWith('L-') ? '🥡 ' + c.mesa : c.mesa}
                            <span class="text-[9px] text-slate-400 block font-mono font-bold">Creación: ${c.fecha} | Fin: ${c.fechaCierre}</span>
                        </div>
                        <button onclick="recuperarComanda('${c.id}')" class="bg-slate-900 hover:bg-orange-500 text-white px-3 py-1.5 rounded-lg font-black uppercase tracking-wider text-[10px] transition-all active:scale-95">Reabrir</button>
                    </div>
                    <div class="text-[10px] text-slate-500 font-black line-clamp-2 border-t border-slate-100 pt-1.5 uppercase font-mono tracking-wide">📦 ${resumenProductos}</div>
                </div>
            `;
                }).join('');

                cont.innerHTML = htmlHistorial;
            } catch (e) { console.error(e); }
        }

        async function recuperarComanda(id) {
            if (confirm("¿Quieres regresar esta comanda al monitor activo? Conservará su hora original de creación.")) {
                const res = await fetch(`${API}/api/comandas/reabrir`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                if (res.ok) {
                    consultarComandas();
                    cargarHistorial();
                }
            }
        }

        async function purgarHistorialCompleto() {
            if (confirm("¿Estás seguro de vaciar el historial de todas las comandas completadas? Esta acción limpiará la memoria tanto en Cocina como en Barra.")) {
                await fetch(`${API}/api/comandas_sistema/purgar_historial`, { method: 'DELETE' });
                cargarHistorial();
            }
        }

        window.onload = () => { cambiarModoTrabajo(modoOperacion); consultarComandas(); setInterval(consultarComandas, 800); };
    </script>
</body>

</html>
