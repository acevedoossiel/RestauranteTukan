<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Cocina - Tukan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @media print {
            @page {
                size: 80mm auto;
                margin: 0;
            }

            body {
                background: white;
                margin: 0;
                padding: 0;
                width: 80mm;
            }

            .no-print {
                display: none !important;
            }

            .ticket-impresion {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                padding: 10px !important;
            }
        }
    </style>
</head>

<body class="bg-zinc-900 text-white min-h-screen p-4 md:p-6 no-scrollbar overflow-y-auto">

    <header
        class="no-print flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-zinc-800 pb-4">
        <div>
            <h1 class="text-xl font-black uppercase tracking-wider text-amber-500">🍳 PRODUCCIÓN: COCINA</h1>
            <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Control dinámico de comandas</p>
        </div>

        <div class="flex items-center gap-2 bg-zinc-800 p-1.5 rounded-2xl border border-zinc-700">
            <button id="btn-modo-print" onclick="cambiarModoTrabajo('impresora')"
                class="px-4 py-2 rounded-xl text-xs font-black uppercase transition-all">🖨️ Impresora</button>
            <button id="btn-modo-tablet" onclick="cambiarModoTrabajo('tablet')"
                class="px-4 py-2 rounded-xl text-xs font-black uppercase transition-all">📱 Tablet</button>
        </div>

        <button onclick="toggleHistorial()"
            class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">📦
            Ver Recuperación</button>
    </header>

    <section id="panel-historial" class="no-print hidden bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-6">
        <h3 class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-3">Historial de Comandas Archivadas
            (Seguridad)</h3>
        <div id="lista-historial-recuperacion" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 text-xs">
        </div>
    </section>

    <main id="contenedor-comandas-visuales"
        class="no-print grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></main>

    <div id="zona-invisible-impresion" class="hidden fixed inset-0 bg-white z-[100] text-black p-4"></div>

    <script src="config.js"></script>
    <script>
        const API = CONFIG.API_URL;
        let modoOperacion = localStorage.getItem('modo_cocina') || 'impresora';
        let idsComandasProcesadas = new Set();

        function cambiarModoTrabajo(modo) {
            modoOperacion = modo;
            localStorage.setItem('modo_cocina', modo);

            const bPrint = document.getElementById('btn-modo-print');
            const bTablet = document.getElementById('btn-modo-tablet');
            const contVisual = document.getElementById('contenedor-comandas-visuales');

            if (modo === 'impresora') {
                bPrint.className = "bg-amber-500 text-black px-4 py-2 rounded-xl text-xs font-black uppercase shadow-md";
                bTablet.className = "text-zinc-400 hover:text-white px-4 py-2 rounded-xl text-xs font-bold uppercase";
                contVisual.classList.add('opacity-40'); // Opacar la vista para denotar que el control lo tiene la ticketera
            } else {
                bTablet.className = "bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-black uppercase shadow-md";
                bPrint.className = "text-zinc-400 hover:text-white px-4 py-2 rounded-xl text-xs font-bold uppercase";
                contVisual.classList.remove('opacity-40');
            }
        }

        async function consultarComandas() {
            try {
                const res = await fetch(`${API}/api/comandas/cocina`);
                const comandas = await res.json();

                // 1. MANEJO EXCLUSIVO DEL MODO IMPRESORA
                if (modoOperacion === 'impresora' && comandas.length > 0) {
                    for (let c of comandas) {
                        if (!idsComandasProcesadas.has(c.id)) {
                            idsComandasProcesadas.add(c.id);
                            ejecutarImpresionTermica(c);
                        }
                    }
                }

                // 2. RENDERIZADO VISUAL PARA MODO TABLET (CHECKLIST)
                renderizarPantallaTablet(comandas);

            } catch (e) { console.error(e); }
        }

        function ejecutarImpresionTermica(c) {
            const zona = document.getElementById('zona-invisible-impresion');

            // Reestructurar los ítems agrupándolos con sus modificadores identados abajo
            const itemsHtml = c.items.map(i => {
                let subtext = i.modificadores.map(m => `  + ${m.nombre}`).join('<br>');
                if (i.nota) subtext += (subtext ? '<br>' : '') + `  * NOTA: ${i.nota}`;
                return `<div class="font-black text-sm uppercase">x1 ${i.producto}</div>
                        ${subtext ? `<div class="text-xs font-mono text-zinc-700 ml-4 mb-1">${subtext}</div>` : ''}`;
            }).join('<br>');

            zona.innerHTML = `
                <div class="ticket-impresion text-center font-mono">
                    <p class="text-xs font-black border-b border-black pb-1 mb-2">*** COMANDA COCINA ***</p>
                    <h2 class="text-xl font-black uppercase mb-1">${c.mesa.startsWith('L-') ? '🥡 ' + c.mesa : 'MESA ' + c.mesa}</h2>
                    <p class="text-[10px] text-zinc-600 mb-4">${c.fecha}</p>
                    <div class="text-left border-b border-black pb-2 mb-2">${itemsHtml}</div>
                    <p class="text-[9px] text-zinc-400">--- SISTEMA TUKAN POS ---</p>
                </div>
            `;

            // Remover clases de ocultación momentáneamente para mandar a la cola de hardware
            document.body.classList.add('overflow-hidden');
            zona.classList.remove('hidden');

            setTimeout(() => {
                window.print();
                zona.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');

                // Avisarle de inmediato al servidor que esta comanda ya se imprimió para sacarla de la cola
                marcarCompletada(c.id);
            }, 300);
        }

        function renderizarPantallaTablet(comandas) {
            const contenedor = document.getElementById('contenedor-comandas-visuales');
            if (comandas.length === 0) {
                contenedor.innerHTML = '<div class="col-span-full text-center text-zinc-600 font-bold uppercase tracking-widest py-20 text-sm">Esperando pedidos de cocina... 🍳</div>';
                return;
            }

            contenedor.innerHTML = comandas.map((c, idxComanda) => {
                const esLlevar = c.mesa.startsWith('L-');

                const listaItems = c.items.map((item, idxItem) => {
                    let detalle = item.modificadores.map(m => m.nombre).join(', ');
                    if (item.nota) detalle += (detalle ? ' | ' : '') + item.nota;
                    return `
                        <label class="flex items-start gap-2.5 p-2 bg-zinc-800 rounded-xl border border-zinc-700/50 cursor-pointer hover:bg-zinc-750">
                            <input type="checkbox" class="w-4 h-4 text-amber-500 rounded bg-zinc-700 border-zinc-600 mt-0.5">
                            <div class="text-xs">
                                <div class="font-black uppercase text-zinc-100">${item.producto}</div>
                                ${detalle ? `<div class="text-[10px] text-zinc-400 font-bold font-mono mt-0.5">↳ ${detalle}</div>` : ''}
                            </div>
                        </label>
                    `;
                }).join('');

                return `
                    <div class="bg-zinc-900 border-2 ${esLlevar ? 'border-orange-500/60' : 'border-zinc-800'} p-4 rounded-3xl shadow-xl flex flex-col justify-between h-fit gap-4">
                        <div>
                            <div class="flex justify-between items-start border-b border-zinc-800 pb-2 mb-3">
                                <h3 class="text-base font-black ${esLlevar ? 'text-orange-500' : 'text-zinc-200'} uppercase">${esLlevar ? '🥡 ' + c.mesa : 'MESA ' + c.mesa}</h3>
                                <span class="text-[10px] font-mono text-zinc-500 font-bold">${c.fecha}</span>
                            </div>
                            <div class="space-y-1.5">${listaItems}</div>
                        </div>
                        <button onclick="marcarCompletada('${c.id}')" class="w-full py-3 rounded-xl font-black text-xs uppercase shadow-md transition active:scale-95
                            ${esLlevar ? 'bg-orange-600 hover:bg-orange-500 text-white' : 'bg-amber-500 hover:bg-amber-400 text-zinc-950'}">
                            ✓ Terminar Orden
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function marcarCompletada(id) {
            await fetch(`${API}/api/comandas/completar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, destino: 'cocina' })
            });
            consultarComandas();
            if (!document.getElementById('panel-historial').classList.contains('hidden')) cargarHistorial();
        }

        function toggleHistorial() {
            const panel = document.getElementById('panel-historial');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) cargarHistorial();
        }

        async function cargarHistorial() {
            const res = await fetch(`${API}/api/comandas/historial`);
            const datos = await res.json();
            const deCocina = datos.filter(c => c.destinoCierre === 'cocina').reverse().slice(0, 9); // Mostrar últimas 9 por espacio

            const cont = document.getElementById('lista-historial-recuperacion');
            if (deCocina.length === 0) {
                cont.innerHTML = '<p class="col-span-full text-zinc-500 font-bold italic">No hay comandas archivadas recientemente.</p>';
                return;
            }

            cont.innerHTML = deCocina.map(c => `
                <div class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl flex justify-between items-center">
                    <div>
                        <span class="font-black uppercase text-zinc-300">${c.mesa}</span>
                        <span class="text-[9px] text-zinc-500 block">Archivado: ${c.fechaCierre}</span>
                    </div>
                    <button onclick="recuperarComanda('${c.id}')" class="bg-zinc-800 hover:bg-zinc-700 text-blue-400 px-2.5 py-1.5 rounded-lg font-bold uppercase tracking-wider text-[10px]">Reabrir</button>
                </div>
            `).join('');
        }

        // Recuperar comanda archivada en caso de dar clic accidental
        async function recuperarComanda(id) {
            // Nota de diseño: Para no crear una ruta compleja, la mandamos al servidor como comanda nueva reusando su estructura
            const res = await fetch(`${API}/api/comandas/historial`);
            const datos = await res.json();
            const encontrada = datos.find(c => c.id === id);

            if (encontrada) {
                // Formatear ítems para volverlos a inyectar al servidor
                const itemsFormateados = encontrada.items.map(i => ({ display: i.producto, base: i.producto, modificadores: i.modificadores, nota: i.nota }));

                // Remover del historial en memoria del servidor mandando solicitud de re-inyección
                await fetch(`${API}/enviar_comanda`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mesa: encontrada.mesa, items: itemsFormateados })
                });

                // Limpiar del historial global remoto para no duplicar
                alert("Comanda reabierta con éxito en el monitor.");
                location.reload();
            }
        }

        // Inicialización y Polling dinámico a 800ms para respuesta inmediata
        window.onload = () => { cambiarModoTrabajo(modoOperacion); consultarComandas(); setInterval(consultarComandas, 800); };
    </script>
</body>

</html>
