<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - El Tukan Restaurante</title>

    <script>
        function obtenerCookie(nombre) {
            const coincidencia = document.cookie.match(new RegExp('(^| )' + nombre + '=([^;]+)'));
            return coincidencia ? coincidencia[2] : null;
        }

        const sesionCookie = obtenerCookie('admin_session');
        const loginTime = sessionStorage.getItem('login_time');
        if (sesionCookie && loginTime) {
            const doceHorasEnMiliseundos = 12 * 60 * 60 * 1000;
            const tiempoTranscurrido = Date.now() - parseInt(loginTime);
            
            if (tiempoTranscurrido < doceHorasEnMiliseundos) {
                console.log("Sesión activa y válida detectada. Redirigiendo al panel...");
                window.location.replace('admin_panel.html');
            }
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        .backdrop-fade {
            background-image: url('resources/tukan-fondo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(2px); 
            transform: scale(1.1); 
        }
    </style>
</head>

<body class="min-h-screen relative overflow-x-hidden font-sans bg-slate-900">

    <div class="absolute inset-0 min-h-screen w-full overflow-hidden pointer-events-none z-0">
        <div class="absolute inset-0 backdrop-fade"></div>
        <div class="absolute inset-0 bg-black opacity-30"></div>
    </div>

    <div class="relative z-20 min-h-screen flex items-center justify-center p-4">
        
        <div class="bg-white/90 backdrop-blur-md w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-t-8 border-orange-500 my-8">
            <div class="p-8">
                <div class="text-center mb-8">
                    <img src="resources/Tukan-logo.png" alt="Logo Tukan" class="mx-auto w-32 h-auto mb-4">
                    <h1 class="text-2xl font-black text-emerald-900 uppercase tracking-wide mt-3">
                        EL TUKAN <span class="text-orange-500">RESTAURANTE</span>
                    </h1>
                    <p class="text-emerald-700/60 text-[11px] font-bold uppercase tracking-widest mt-2">
                        Panel Administrativo
                    </p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-bold text-emerald-800 uppercase tracking-wider mb-2 ml-1">
                            Usuario
                        </label>
                        <input type="text" id="user"
                            class="w-full bg-white/70 border-2 border-emerald-100/50 rounded-2xl px-5 py-4 font-bold text-slate-700 focus:border-orange-500 focus:bg-white focus:outline-none transition-all placeholder:text-slate-400"
                            placeholder="Ingresa usuario">
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-emerald-800 uppercase tracking-wider mb-2 ml-1">
                            Contraseña
                        </label>
                        <input type="password" id="pass"
                            class="w-full bg-white/70 border-2 border-emerald-100/50 rounded-2xl px-5 py-4 font-bold text-slate-700 focus:border-orange-500 focus:bg-white focus:outline-none transition-all placeholder:text-slate-400"
                            placeholder="Ingresa contraseña">
                    </div>
                    
                    <div id="error-msg" class="hidden text-red-600 text-xs font-bold text-center animate-pulse">
                        ⚠️ Usuario o contraseña incorrectos
                    </div>
                    
                    <button onclick="intentarLogin()"
                        class="w-full bg-orange-500 hover:bg-emerald-800 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-500/20 transform active:scale-95 transition-all uppercase tracking-widest text-xs">
                        Entrar al Sistema
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = CONFIG.API_URL;

        async function intentarLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const errorDiv = document.getElementById('error-msg');
            errorDiv.classList.add('hidden');

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                const data = await res.json();
                console.log("Respuesta del servidor:", data);

                if (data.success) {
                    sessionStorage.setItem('admin_token', data.token);
                    sessionStorage.setItem('login_time', Date.now().toString());
                    document.cookie = "admin_session=" + data.token + "; path=/;";
                    console.log("Login exitoso, redirigiendo...");
                    window.location.replace('admin_panel.html');
                } else {
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Error detallado:", err);
                alert("Error de conexión con el servidor");
            }
        }
    </script>
</body>

</html>
